<div
  class="modal"
  id="figureExportDialog"
  tabindex="-1"
  role="dialog"
  aria-hidden="true"
>
  <div class="modal-dialog" style="width: 600px">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Export Figure to PDF or TIFF</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">

      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-default"
          data-bs-dismiss="modal"
        >
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">
          Export Figure
        </button>
      </div>
    </div>
  </div>
</div>
