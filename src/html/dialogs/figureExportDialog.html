<div
  class="modal"
  id="figureExportDialog"
  tabindex="-1"
  role="dialog"
  aria-hidden="true"
>
  <div class="modal-dialog" style="width: 600px">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="script_version_mismatch" class="modal-title">Export Figure to PDF or TIFF</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">

        <div>
          <p>
            Choose location to export the figure as PDF or TIFF...
          </p>
        </div>

      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">
          OK
        </button>
      </div>
    </div>
  </div>
</div>
